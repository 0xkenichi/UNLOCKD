name: Quality Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/contracts/**"
      - "test/**"
      - "packages/scripts/**"
      - "packages/backend/**"
      - "frontend/**"
      - "eslint.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/quality-gate.yml"
  push:
    branches: ["main"]
    paths:
      - "packages/contracts/**"
      - "test/**"
      - "packages/scripts/**"
      - "packages/backend/**"
      - "frontend/**"
      - "eslint.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/quality-gate.yml"

jobs:
  # CRITICAL: This job handles invariant and unit tests. Must pass as a blocking gate.
  foundry-tests:
    name: Blocking Foundry Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.2.0
        with:
          version: nightly

      - name: Run Foundry tests
        run: forge test
        working-directory: packages/contracts

  lint:
    runs-on: ubuntu-latest
    needs: [foundry-tests]
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup Node
        uses: actions/setup-node@v4.0.3
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Run lint checks
        run: npm run lint

  protocol-tests:
    runs-on: ubuntu-latest
    needs: [foundry-tests]
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup Node
        uses: actions/setup-node@v4.0.3
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Run contract tests
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    needs: [foundry-tests]
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup Node
        uses: actions/setup-node@v4.0.3
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  frontend-e2e-smoke:
    runs-on: ubuntu-latest
    needs: [foundry-tests]
    timeout-minutes: 25
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup Node
        uses: actions/setup-node@v4.0.3
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run frontend smoke tests
        run: npm run test:e2e:smoke --prefix frontend

  backend-smoke:
    runs-on: ubuntu-latest
    needs: [foundry-tests]
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup Node
        uses: actions/setup-node@v4.0.3
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm install --prefix packages/backend

      - name: Start backend
        run: |
          PORT=4100 INDEXER_ENABLED=false DEPLOYMENTS_NETWORK=localhost node packages/backend/server.js > /tmp/unlockd-backend.log 2>&1 &
          echo $! > /tmp/unlockd-backend.pid
      - name: Wait for health endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4100/api/health >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "Backend health check failed"
          cat /tmp/unlockd-backend.log || true
          exit 1

      - name: Print backend logs on failure
        if: failure()
        run: cat /tmp/unlockd-backend.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/unlockd-backend.pid ]; then
            kill "$(cat /tmp/unlockd-backend.pid)" || true
          fi
