name: Security and Coverage

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/contracts/**"
      - "test/**"
      - "hardhat.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/security-and-coverage.yml"
  push:
    branches: ["main"]
    paths:
      - "packages/contracts/**"
      - "test/**"
      - "hardhat.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/security-and-coverage.yml"

jobs:
  coverage-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run solidity coverage
        run: npm run test:coverage

      - name: Enforce minimum coverage thresholds
        run: |
          export MIN_STATEMENTS=30
          export MIN_BRANCHES=15
          export MIN_FUNCTIONS=30
          export MIN_LINES=30
          node -e '
          const fs = require("fs");
          const path = "packages/contracts/coverage.json";
          if (!fs.existsSync(path)) {
            console.error("coverage report not found at " + path);
            process.exit(1);
          }
          const report = JSON.parse(fs.readFileSync(path, "utf8"));
          const totals = {
            statements: { covered: 0, total: 0 },
            branches: { covered: 0, total: 0 },
            functions: { covered: 0, total: 0 },
            lines: { covered: 0, total: 0 }
          };
          for (const file of Object.values(report)) {
            const statements = Object.values(file.s || {});
            totals.statements.total += statements.length;
            totals.statements.covered += statements.filter((n) => Number(n) > 0).length;
            totals.lines.total += statements.length;
            totals.lines.covered += statements.filter((n) => Number(n) > 0).length;

            const functions = Object.values(file.f || {});
            totals.functions.total += functions.length;
            totals.functions.covered += functions.filter((n) => Number(n) > 0).length;

            const branches = Object.values(file.b || {}).flat();
            totals.branches.total += branches.length;
            totals.branches.covered += branches.filter((n) => Number(n) > 0).length;
          }
          const pctOf = ({ covered, total }) => total === 0 ? 100 : (covered / total) * 100;
          const checks = [
            ["statements", Number(process.env.MIN_STATEMENTS || 30)],
            ["branches", Number(process.env.MIN_BRANCHES || 15)],
            ["functions", Number(process.env.MIN_FUNCTIONS || 30)],
            ["lines", Number(process.env.MIN_LINES || 30)]
          ];
          let failed = false;
          for (const [key, min] of checks) {
            const pct = Number(pctOf(totals[key]).toFixed(2));
            console.log(`${key}: ${pct}% (min ${min}%)`);
            if (pct < min) failed = true;
          }
          if (failed) {
            console.error("Coverage threshold check failed");
            process.exit(1);
          }'

  slither-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither static analysis
        continue-on-error: true
        run: |
          slither packages/contracts \
            --exclude-low \
            --exclude-informational \
            --exclude-optimization \
            --exclude uninitialized-state,divide-before-multiply,incorrect-equality,locked-ether,reentrancy-no-eth,reentrancy-eth,unused-return,reentrancy-events,reentrancy-benign \
            --filter-paths "node_modules|frontend|backend|docs|scripts|deployments"
